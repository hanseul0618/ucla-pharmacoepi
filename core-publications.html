<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Core Publications — UCLA Pharmacoepidemiology</title>
  <style>
    :root {
      /* UCLA brand — primary */
      --ucla-blue: #2774AE;
      --ucla-gold: #FFD100;
      /* UCLA brand — secondary */
      --darkest-blue: #003B5C;
      --darker-blue: #005587;
      --lighter-blue: #8BB8E8;
      --lightest-blue: #DAEBFE;
      --darkest-gold: #FFB81C;
      --darker-gold: #FFC72C;
      /* neutrals */
      --text-primary: #1a1a1a;
      --text-secondary: #555;
      --text-tertiary: #888;
      --border: #e5e5e5;
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 24px 20px;
      color: var(--text-primary);
      background: #fff;
      line-height: 1.5;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 3px solid var(--darker-blue);
    }

    .header-text h1 {
      font-size: 22px;
      font-weight: 600;
      margin: 0;
      color: var(--darkest-blue);
    }

    .header-text p.subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin: 4px 0 6px;
    }

    .header-text p.link-line {
      font-size: 12px;
      color: var(--text-secondary);
      margin: 0;
    }

    .header-text p.link-line a {
      color: var(--ucla-blue);
      text-decoration: none;
      font-weight: 500;
    }

    .header-text p.link-line a:hover {
      text-decoration: underline;
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 13px;
    }

    .controls label {
      color: var(--text-secondary);
    }

    .controls select {
      font-size: 13px;
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-family: inherit;
      color: var(--darkest-blue);
    }

    .controls select:focus {
      outline: none;
      border-color: var(--ucla-blue);
      box-shadow: 0 0 0 2px var(--lightest-blue);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat {
      background: var(--lightest-blue);
      padding: 14px 16px;
      border-radius: 6px;
      border-left: 4px solid var(--darker-blue);
    }

    .stat-label {
      font-size: 12px;
      color: var(--darker-blue);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 0 0 4px;
      font-weight: 500;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--darkest-blue);
      margin: 0;
      line-height: 1;
    }

    .stat-sublabel {
      font-size: 11px;
      color: var(--darker-blue);
      margin: 4px 0 0;
      opacity: 0.75;
    }

    .list-info {
      font-size: 12px;
      color: var(--text-tertiary);
      margin: 0 0 12px;
      font-style: italic;
    }

    .pub-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .pub {
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .pub:hover {
      border-color: var(--ucla-blue);
      box-shadow: 0 1px 4px rgba(39, 116, 174, 0.12);
    }

    .pub-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
      margin: 0 0 6px;
    }

    .pub-title a {
      color: var(--darkest-blue);
      text-decoration: none;
    }

    .pub-title a:hover {
      color: var(--ucla-blue);
      text-decoration: underline;
    }

    .pub-authors {
      font-size: 13px;
      color: var(--text-secondary);
      margin: 0 0 6px;
      line-height: 1.5;
    }

    .pub-authors .highlight {
      font-weight: 600;
      color: var(--darker-blue);
    }

    .pub-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      font-size: 12px;
    }

    .pub-journal {
      background: var(--lightest-blue);
      color: var(--darkest-blue);
      padding: 3px 10px;
      border-radius: 3px;
      font-weight: 500;
    }

    .pub-date {
      color: var(--text-tertiary);
    }

    .pub-doi {
      color: var(--text-tertiary);
    }

    .pub-doi a {
      color: var(--text-tertiary);
      text-decoration: none;
    }

    .pub-doi a:hover {
      color: var(--ucla-blue);
      text-decoration: underline;
    }

    .loading, .error, .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .error {
      color: #b00020;
      background: #fdf2f2;
      border-radius: 6px;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--ucla-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      body { padding: 16px 12px; }
      .header-text h1 { font-size: 18px; }
      .controls { width: 100%; justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="header">
      <div class="header-text">
        <h1>Core Publications</h1>
        <p class="subtitle">Research led by our program</p>
        <p class="link-line">
          For the complete list, please visit 
          <a id="pubmed-link" href="https://pubmed.ncbi.nlm.nih.gov/?term=%22Patorno+Elisabetta%22%5Bau%5D+AND+%22Paik+Julie+M%22%5Bau%5D" target="_blank" rel="noopener">PubMed</a>.
        </p>
      </div>
      <div class="controls">
        <label for="limit-select">Show:</label>
        <select id="limit-select">
          <option value="10">10 most recent</option>
          <option value="25" selected>25 most recent</option>
          <option value="50">50 most recent</option>
          <option value="500">All</option>
        </select>
      </div>
    </header>

    <div class="stats" id="stats" style="display: none;">
      <div class="stat">
        <p class="stat-label" id="stat-year-0-label">—</p>
        <p class="stat-value" id="stat-year-0">—</p>
        <p class="stat-sublabel">publications</p>
      </div>
      <div class="stat">
        <p class="stat-label" id="stat-year-1-label">—</p>
        <p class="stat-value" id="stat-year-1">—</p>
        <p class="stat-sublabel">publications</p>
      </div>
      <div class="stat">
        <p class="stat-label" id="stat-year-2-label">—</p>
        <p class="stat-value" id="stat-year-2">—</p>
        <p class="stat-sublabel">publications</p>
      </div>
    </div>

    <p class="list-info" id="list-info" style="display: none;"></p>

    <div id="content">
      <div class="loading"><span class="spinner"></span>Loading publications from PubMed…</div>
    </div>
  </div>

  <script>
    const QUERY = '"Patorno Elisabetta"[au] AND "Paik Julie M"[au]';
    const EUTILS = 'https://eutils.ncbi.nlm.nih.gov/entrez/eutils';
    const HIGHLIGHT_AUTHORS = ['Patorno E', 'Paik JM', 'Paik J'];
    const STATS_RETMAX = 500; // always fetch full dataset for stats calculation

    const contentEl = document.getElementById('content');
    const statsEl = document.getElementById('stats');
    const listInfoEl = document.getElementById('list-info');
    const limitSelect = document.getElementById('limit-select');

    // Cache the full dataset so we don't re-fetch on every dropdown change
    let fullDataset = null;

    async function fetchPubmed(retmax) {
      // Step 1: esearch — get list of PMIDs
      const searchUrl = `${EUTILS}/esearch.fcgi?db=pubmed&term=${encodeURIComponent(QUERY)}&retmax=${retmax}&sort=date&retmode=json`;
      const searchRes = await fetch(searchUrl);
      if (!searchRes.ok) throw new Error(`esearch failed: ${searchRes.status}`);
      const searchData = await searchRes.json();
      const pmids = searchData.esearchresult?.idlist || [];
      const totalCount = parseInt(searchData.esearchresult?.count || '0');

      if (pmids.length === 0) return { pubs: [], totalCount: 0 };

      // Step 2: esummary — get metadata for each PMID
      const summaryUrl = `${EUTILS}/esummary.fcgi?db=pubmed&id=${pmids.join(',')}&retmode=json`;
      const summaryRes = await fetch(summaryUrl);
      if (!summaryRes.ok) throw new Error(`esummary failed: ${summaryRes.status}`);
      const summaryData = await summaryRes.json();

      const result = summaryData.result || {};
      const pubs = pmids.map(pmid => result[pmid]).filter(Boolean);
      return { pubs, totalCount };
    }

    function formatAuthors(authors) {
      if (!authors || authors.length === 0) return '';
      return authors.map(a => {
        const name = a.name || '';
        const isHighlight = HIGHLIGHT_AUTHORS.some(h => name === h || name.startsWith(h));
        return isHighlight
          ? `<span class="highlight">${escapeHtml(name)}</span>`
          : escapeHtml(name);
      }).join(', ');
    }

    function extractDoi(articleids) {
      if (!articleids) return null;
      const doi = articleids.find(a => a.idtype === 'doi');
      return doi ? doi.value : null;
    }

    function getYear(pub) {
      // pubdate format varies: "2025 Jan 1", "2026 Feb", "2025", etc.
      const d = pub.pubdate || pub.epubdate || '';
      const m = d.match(/(\d{4})/);
      return m ? parseInt(m[1]) : null;
    }

    function escapeHtml(s) {
      if (!s) return '';
      return s.replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function renderStats(fullPubs) {
      const currentYear = new Date().getFullYear();
      const targetYears = [currentYear, currentYear - 1, currentYear - 2];
      const yearCounts = {};
      targetYears.forEach(y => yearCounts[y] = 0);

      fullPubs.forEach(p => {
        const y = getYear(p);
        if (y && yearCounts.hasOwnProperty(y)) {
          yearCounts[y]++;
        }
      });

      targetYears.forEach((y, i) => {
        document.getElementById(`stat-year-${i}-label`).textContent = y;
        document.getElementById(`stat-year-${i}`).textContent = yearCounts[y];
      });
      statsEl.style.display = 'grid';
    }

    function renderPublicationList(pubsToShow, totalCount) {
      if (pubsToShow.length === 0) {
        contentEl.innerHTML = '<div class="empty">No publications found.</div>';
        listInfoEl.style.display = 'none';
        return;
      }

      // Info line: "Showing X of Y"
      if (pubsToShow.length < totalCount) {
        listInfoEl.textContent = `Showing ${pubsToShow.length} of ${totalCount} total publications, most recent first.`;
      } else {
        listInfoEl.textContent = `Showing all ${pubsToShow.length} publications, most recent first.`;
      }
      listInfoEl.style.display = 'block';

      const html = pubsToShow.map(p => {
        const pmid = p.uid;
        const title = escapeHtml(p.title || 'Untitled').replace(/\.$/, '');
        const authors = formatAuthors(p.authors);
        const journal = escapeHtml(p.source || p.fulljournalname || '');
        const date = escapeHtml(p.pubdate || '');
        const volume = p.volume ? `;${escapeHtml(p.volume)}` : '';
        const issue = p.issue ? `(${escapeHtml(p.issue)})` : '';
        const pages = p.pages ? `:${escapeHtml(p.pages)}` : '';
        const doi = extractDoi(p.articleids);

        return `
          <article class="pub">
            <h2 class="pub-title">
              <a href="https://pubmed.ncbi.nlm.nih.gov/${pmid}/" target="_blank" rel="noopener">${title}</a>
            </h2>
            <p class="pub-authors">${authors}</p>
            <div class="pub-meta">
              <span class="pub-journal">${journal}</span>
              <span class="pub-date">${date}${volume}${issue}${pages}</span>
              ${doi ? `<span class="pub-doi">• <a href="https://doi.org/${escapeHtml(doi)}" target="_blank" rel="noopener">doi:${escapeHtml(doi)}</a></span>` : ''}
            </div>
          </article>
        `;
      }).join('');

      contentEl.innerHTML = `<div class="pub-list">${html}</div>`;
    }

    function updateList() {
      if (!fullDataset) return;
      const limit = parseInt(limitSelect.value);
      const slice = fullDataset.pubs.slice(0, limit);
      renderPublicationList(slice, fullDataset.totalCount);
    }

    async function init() {
      try {
        // Always fetch the full dataset (up to STATS_RETMAX) on page load
        fullDataset = await fetchPubmed(STATS_RETMAX);
        renderStats(fullDataset.pubs);
        updateList();
      } catch (err) {
        console.error(err);
        contentEl.innerHTML = `
          <div class="error">
            Unable to load publications. ${escapeHtml(err.message)}<br>
            <small>You can view them directly on <a href="https://pubmed.ncbi.nlm.nih.gov/?term=%22Patorno+Elisabetta%22%5Bau%5D+AND+%22Paik+Julie+M%22%5Bau%5D" target="_blank" rel="noopener">PubMed</a>.</small>
          </div>
        `;
      }
    }

    limitSelect.addEventListener('change', updateList);
    init();
  </script>
</body>
</html>
