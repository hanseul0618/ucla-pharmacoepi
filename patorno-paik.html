<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patorno & Paik — Publications</title>
  <style>
    :root {
      --ucla-blue: #2774AE;
      --ucla-darkblue: #003B5C;
      --ucla-gold: #FFD100;
      --text-primary: #1a1a1a;
      --text-secondary: #555;
      --text-tertiary: #888;
      --border: #e5e5e5;
      --bg-subtle: #f7f9fb;
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 24px 20px;
      color: var(--text-primary);
      background: #fff;
      line-height: 1.5;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--ucla-blue);
    }

    .header h1 {
      font-size: 22px;
      font-weight: 600;
      margin: 0;
      color: var(--ucla-darkblue);
    }

    .header p {
      font-size: 13px;
      color: var(--text-secondary);
      margin: 4px 0 0;
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 13px;
    }

    .controls label {
      color: var(--text-secondary);
    }

    .controls select {
      font-size: 13px;
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-family: inherit;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat {
      background: var(--bg-subtle);
      padding: 12px 16px;
      border-radius: 6px;
      border-left: 3px solid var(--ucla-blue);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 0 0 4px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 600;
      color: var(--ucla-darkblue);
      margin: 0;
    }

    .pub-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .pub {
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .pub:hover {
      border-color: var(--ucla-blue);
      box-shadow: 0 1px 4px rgba(39, 116, 174, 0.08);
    }

    .pub-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
      margin: 0 0 6px;
    }

    .pub-title a {
      color: var(--ucla-darkblue);
      text-decoration: none;
    }

    .pub-title a:hover {
      color: var(--ucla-blue);
      text-decoration: underline;
    }

    .pub-authors {
      font-size: 13px;
      color: var(--text-secondary);
      margin: 0 0 6px;
      line-height: 1.5;
    }

    .pub-authors .highlight {
      font-weight: 600;
      color: var(--ucla-darkblue);
    }

    .pub-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      font-size: 12px;
    }

    .pub-journal {
      background: #eaf2f9;
      color: var(--ucla-darkblue);
      padding: 2px 8px;
      border-radius: 3px;
      font-weight: 500;
    }

    .pub-date {
      color: var(--text-tertiary);
    }

    .pub-doi {
      color: var(--text-tertiary);
    }

    .pub-doi a {
      color: var(--text-tertiary);
      text-decoration: none;
    }

    .pub-doi a:hover {
      color: var(--ucla-blue);
      text-decoration: underline;
    }

    .loading, .error, .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .error {
      color: #b00020;
      background: #fdf2f2;
      border-radius: 6px;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--ucla-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-tertiary);
      text-align: center;
    }

    .footer a {
      color: var(--ucla-blue);
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      body { padding: 16px 12px; }
      .header h1 { font-size: 18px; }
      .controls { width: 100%; justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="header">
      <div>
        <h1>Recent Publications</h1>
        <p>Elisabetta Patorno &amp; Julie M. Paik — co-authored work</p>
      </div>
      <div class="controls">
        <label for="limit-select">Show:</label>
        <select id="limit-select">
          <option value="10">10 most recent</option>
          <option value="25" selected>25 most recent</option>
          <option value="50">50 most recent</option>
          <option value="100">All (up to 100)</option>
        </select>
      </div>
    </header>

    <div class="stats" id="stats" style="display: none;">
      <div class="stat">
        <p class="stat-label">Publications shown</p>
        <p class="stat-value" id="stat-count">—</p>
      </div>
      <div class="stat">
        <p class="stat-label">Unique journals</p>
        <p class="stat-value" id="stat-journals">—</p>
      </div>
      <div class="stat">
        <p class="stat-label">Most recent</p>
        <p class="stat-value" id="stat-latest">—</p>
      </div>
    </div>

    <div id="content">
      <div class="loading"><span class="spinner"></span>Loading publications from PubMed…</div>
    </div>

    <div class="footer">
      <p>
        Data retrieved live from
        <a href="https://pubmed.ncbi.nlm.nih.gov/?term=%22Patorno+Elisabetta%22%5Bau%5D+AND+%22Paik+Julie+M%22%5Bau%5D" target="_blank" rel="noopener">PubMed</a>
        via NCBI E-utilities. Query: <code>"Patorno Elisabetta"[au] AND "Paik Julie M"[au]</code>
      </p>
    </div>
  </div>

  <script>
    const QUERY = '"Patorno Elisabetta"[au] AND "Paik Julie M"[au]';
    const EUTILS = 'https://eutils.ncbi.nlm.nih.gov/entrez/eutils';
    const HIGHLIGHT_AUTHORS = ['Patorno E', 'Paik JM', 'Paik J'];

    const contentEl = document.getElementById('content');
    const statsEl = document.getElementById('stats');
    const limitSelect = document.getElementById('limit-select');

    async function fetchPubmed(retmax) {
      // Step 1: esearch — get list of PMIDs
      const searchUrl = `${EUTILS}/esearch.fcgi?db=pubmed&term=${encodeURIComponent(QUERY)}&retmax=${retmax}&sort=date&retmode=json`;
      const searchRes = await fetch(searchUrl);
      if (!searchRes.ok) throw new Error(`esearch failed: ${searchRes.status}`);
      const searchData = await searchRes.json();
      const pmids = searchData.esearchresult?.idlist || [];

      if (pmids.length === 0) return [];

      // Step 2: esummary — get metadata for each PMID
      const summaryUrl = `${EUTILS}/esummary.fcgi?db=pubmed&id=${pmids.join(',')}&retmode=json`;
      const summaryRes = await fetch(summaryUrl);
      if (!summaryRes.ok) throw new Error(`esummary failed: ${summaryRes.status}`);
      const summaryData = await summaryRes.json();

      const result = summaryData.result || {};
      return pmids.map(pmid => result[pmid]).filter(Boolean);
    }

    function formatAuthors(authors) {
      if (!authors || authors.length === 0) return '';
      return authors.map(a => {
        const name = a.name || '';
        const isHighlight = HIGHLIGHT_AUTHORS.some(h => name === h || name.startsWith(h));
        return isHighlight
          ? `<span class="highlight">${escapeHtml(name)}</span>`
          : escapeHtml(name);
      }).join(', ');
    }

    function extractDoi(articleids) {
      if (!articleids) return null;
      const doi = articleids.find(a => a.idtype === 'doi');
      return doi ? doi.value : null;
    }

    function escapeHtml(s) {
      if (!s) return '';
      return s.replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function renderPublications(pubs) {
      if (pubs.length === 0) {
        contentEl.innerHTML = '<div class="empty">No publications found.</div>';
        statsEl.style.display = 'none';
        return;
      }

      // Update stats
      const journals = new Set(pubs.map(p => p.fulljournalname || p.source).filter(Boolean));
      const years = pubs.map(p => {
        const d = p.pubdate || '';
        const m = d.match(/\d{4}/);
        return m ? parseInt(m[0]) : null;
      }).filter(Boolean);
      document.getElementById('stat-count').textContent = pubs.length;
      document.getElementById('stat-journals').textContent = journals.size;
      document.getElementById('stat-latest').textContent = years.length ? Math.max(...years) : '—';
      statsEl.style.display = 'grid';

      // Render list
      const html = pubs.map(p => {
        const pmid = p.uid;
        const title = escapeHtml(p.title || 'Untitled').replace(/\.$/, '');
        const authors = formatAuthors(p.authors);
        const journal = escapeHtml(p.source || p.fulljournalname || '');
        const date = escapeHtml(p.pubdate || '');
        const volume = p.volume ? `;${escapeHtml(p.volume)}` : '';
        const issue = p.issue ? `(${escapeHtml(p.issue)})` : '';
        const pages = p.pages ? `:${escapeHtml(p.pages)}` : '';
        const doi = extractDoi(p.articleids);

        return `
          <article class="pub">
            <h2 class="pub-title">
              <a href="https://pubmed.ncbi.nlm.nih.gov/${pmid}/" target="_blank" rel="noopener">${title}</a>
            </h2>
            <p class="pub-authors">${authors}</p>
            <div class="pub-meta">
              <span class="pub-journal">${journal}</span>
              <span class="pub-date">${date}${volume}${issue}${pages}</span>
              ${doi ? `<span class="pub-doi">• <a href="https://doi.org/${escapeHtml(doi)}" target="_blank" rel="noopener">doi:${escapeHtml(doi)}</a></span>` : ''}
            </div>
          </article>
        `;
      }).join('');

      contentEl.innerHTML = `<div class="pub-list">${html}</div>`;
    }

    async function loadAndRender() {
      const retmax = parseInt(limitSelect.value);
      contentEl.innerHTML = '<div class="loading"><span class="spinner"></span>Loading publications from PubMed…</div>';
      statsEl.style.display = 'none';

      try {
        const pubs = await fetchPubmed(retmax);
        renderPublications(pubs);
      } catch (err) {
        console.error(err);
        contentEl.innerHTML = `
          <div class="error">
            Unable to load publications. ${escapeHtml(err.message)}<br>
            <small>You can view them directly on <a href="https://pubmed.ncbi.nlm.nih.gov/?term=%22Patorno+Elisabetta%22%5Bau%5D+AND+%22Paik+Julie+M%22%5Bau%5D" target="_blank" rel="noopener">PubMed</a>.</small>
          </div>
        `;
      }
    }

    limitSelect.addEventListener('change', loadAndRender);
    loadAndRender();
  </script>
</body>
</html>
